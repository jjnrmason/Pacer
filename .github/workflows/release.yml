name: Release

# Publishes Pacer to NuGet when a version tag (e.g. v1.2.3) is pushed.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create/attach to the GitHub Release
  id-token: write   # request the OIDC token for NuGet Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release

      - name: Pack
        run: dotnet pack src/Pacer/Pacer.csproj --configuration Release -p:Version=${{ steps.version.outputs.version }} --output ./nupkg

      # Exchanges the workflow's OIDC token for a short-lived NuGet API key via the
      # Trusted Publishing policy configured on nuget.org. No long-lived secret needed.
      - name: NuGet trusted publishing login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Attach packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./nupkg/*.nupkg
            ./nupkg/*.snupkg
